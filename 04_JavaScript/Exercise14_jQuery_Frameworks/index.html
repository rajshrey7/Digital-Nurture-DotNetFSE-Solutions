<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jQuery and Frameworks</title>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        body{
            font-family: Arial, sans-serif;
            margin:20px;
        }

        .event-card{
            border:1px solid #ccc;
            padding:15px;
            width:300px;
            border-radius:8px;
            display:none;
        }

        button{
            margin-right:10px;
            padding:10px 20px;
        }
    </style>
</head>
<body>

    <h1>Community Event Portal</h1>

    <button id="registerBtn">
        Show Event
    </button>

    <button id="hideBtn">
        Hide Event
    </button>

    <div class="event-card">

        <h3>Music Festival</h3>

        <p>
            Join us for an exciting music event.
        </p>

    </div>

    <script src="main.js"></script>

</body>
</html>
