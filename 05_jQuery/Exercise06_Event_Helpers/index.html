<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Helpers</title>

    <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>

    <style>
        body{
            font-family: Arial, sans-serif;
            margin:20px;
        }

        #eventBox{
            width:300px;
            height:150px;
            border:2px solid black;
            background-color:lightgray;
            text-align:center;
            line-height:150px;
            margin-bottom:20px;
        }

        input{
            padding:10px;
            width:300px;
        }

        #message{
            margin-top:15px;
            font-weight:bold;
        }
    </style>
</head>
<body>

    <h1>Event Helpers Demo</h1>

    <div id="eventBox">
        Hover or Click Me
    </div>

    <input
        type="text"
        id="textInput"
        placeholder="Type something">

    <p id="message"></p>

    <script src="main.js"></script>

</body>
</html>
