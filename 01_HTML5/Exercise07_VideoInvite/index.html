<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Invite</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 30px;
        }

        video{
            border: 2px solid black;
            border-radius: 10px;
        }

        #status{
            color: green;
            font-weight: bold;
            margin-top: 15px;
        }

        textarea{
            width: 400px;
            height: 100px;
            margin-top: 20px;
            padding: 10px;
        }
    </style>

    <script>

        function videoReady(){
            document.getElementById("status").innerHTML =
                "✅ Video ready to play";
        }

        window.onbeforeunload = function(){
            return "You have unsaved changes. Are you sure you want to leave?";
        };

    </script>

</head>
<body>

    <h1>Community Event Promo Video</h1>

    <video
        width="600"
        controls
        oncanplay="videoReady()">

        <source
            src="https://www.w3schools.com/html/mov_bbb.mp4"
            type="video/mp4">

        Your browser does not support video.
    </video>

    <p id="status"></p>

    <h3>Event Notes</h3>

    <textarea
        placeholder="Type something before leaving the page...">
    </textarea>

</body>
</html>
