<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Event Gallery</title>

    <style>
        table {
            margin: auto;
            border-collapse: collapse;
        }

        td {
            padding: 10px;
            text-align: center;
        }

        .event-image {
            width: 250px;
            height: 150px;
            border: 3px solid #333;
            border-radius: 8px;
        }

        caption {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <table>
        <caption>Community Events Gallery</caption>

        <tr>
            <td>
                <img src="https://picsum.photos/250/150?1"
                     alt="Music Festival"
                     title="Music Festival"
                     class="event-image">
                <p>Music Festival</p>
            </td>

            <td>
                <img src="https://picsum.photos/250/150?2"
                     alt="Food Fair"
                     title="Food Fair"
                     class="event-image">
                <p>Food Fair</p>
            </td>

            <td>
                <img src="https://picsum.photos/250/150?3"
                     alt="Marathon"
                     title="Marathon"
                     class="event-image">
                <p>Marathon Event</p>
            </td>
        </tr>

        <tr>
            <td>
                <img src="https://picsum.photos/250/150?4"
                     alt="Book Exhibition"
                     title="Book Exhibition"
                     class="event-image">
                <p>Book Exhibition</p>
            </td>

            <td>
                <img src="https://picsum.photos/250/150?5"
                     alt="Community Meet"
                     title="Community Meet"
                     class="event-image">
                <p>Community Meet</p>
            </td>

            <td>
                <img src="https://picsum.photos/250/150?6"
                     alt="Sports Day"
                     title="Sports Day"
                     class="event-image">
                <p>Sports Day</p>
            </td>
        </tr>

    </table>

</body>
</html>
