<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome Banner</title>

    <style>
        #welcomeBanner {
            background-color: blue;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .highlight {
            background-color: yellow;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="welcomeBanner">
        <h1>Welcome Back, Resident!</h1>

        <p>
            Register today and get
            <span style="color:red;font-weight:bold;">
                20% OFF
            </span>
            on premium events.
        </p>
    </div>

    <p class="highlight">
        New events have been added this week.
    </p>

    <p class="highlight">
        Early registrations receive special benefits.
    </p>

</body>
</html>
