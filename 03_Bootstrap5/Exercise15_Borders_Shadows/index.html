<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borders and Shadows</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>
<body>

    <div class="container py-5">

        <h1 class="text-center mb-5">
            Borders, Shadows & Rounded Corners
        </h1>

        <div class="text-center mb-5">

            <img
                src="images/profile.png"
                alt="Profile"
                class="border border-primary border-3 rounded-circle shadow"
                width="200"
                height="200">

        </div>

        <div class="card shadow-lg p-4 rounded-pill text-center">

            <h3>Premium Community Membership</h3>

            <p class="mb-0">
                Get access to exclusive events, workshops and VIP benefits.
            </p>

        </div>

    </div>

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

</body>
</html>
