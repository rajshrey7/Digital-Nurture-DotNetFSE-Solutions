<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display and Visibility</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>
<body>

    <div class="container-fluid">

        <div class="row">

            <div class="col-md-3 bg-dark text-white p-4 d-none d-md-block">

                <h3>Sidebar</h3>

                <ul class="list-unstyled">
                    <li>Dashboard</li>
                    <li>Events</li>
                    <li>Members</li>
                    <li>Reports</li>
                </ul>

            </div>

            <div class="col-md-9 p-4">

                <h1>Community Event Portal</h1>

                <p>
                    Main content area visible on all screen sizes.
                </p>

                <div class="bg-primary text-white p-3 rounded d-none d-lg-flex justify-content-center">

                    This section is visible only on large screens.

                </div>

                <div class="alert alert-warning mt-4">

                    Resize the browser window to test visibility utilities.

                </div>

            </div>

        </div>

    </div>

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

</body>
</html>
