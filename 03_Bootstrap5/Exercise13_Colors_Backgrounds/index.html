<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Colors and Backgrounds</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>
<body>

    <div class="container py-5">

        <h1 class="text-center mb-5">
            Community Dashboard
        </h1>

        <div class="row g-4">

            <div class="col-md-3">
                <div class="bg-primary text-white p-4 rounded text-center">
                    <h3>Events</h3>
                    <p>25 Upcoming</p>
                </div>
            </div>

            <div class="col-md-3">
                <div class="bg-success text-white p-4 rounded text-center">
                    <h3>Members</h3>
                    <p>1,250 Active</p>
                </div>
            </div>

            <div class="col-md-3">
                <div class="bg-warning text-dark p-4 rounded text-center">
                    <h3>Pending</h3>
                    <p>18 Requests</p>
                </div>
            </div>

            <div class="col-md-3">
                <div class="bg-danger text-white p-4 rounded text-center">
                    <h3>Alerts</h3>
                    <p>5 Notifications</p>
                </div>
            </div>

        </div>

        <hr class="my-5">

        <div class="bg-dark bg-gradient text-white p-5 rounded text-center">

            <h2>
                Premium Membership
            </h2>

            <p>
                Get exclusive access to VIP events and workshops.
            </p>

            <button class="btn btn-light">
                Join Now
            </button>

        </div>

        <hr class="my-5">

        <h3 class="text-primary">
            Primary Text
        </h3>

        <h3 class="text-success">
            Success Text
        </h3>

        <h3 class="text-warning">
            Warning Text
        </h3>

        <h3 class="text-danger">
            Danger Text
        </h3>

    </div>

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

</body>
</html>
