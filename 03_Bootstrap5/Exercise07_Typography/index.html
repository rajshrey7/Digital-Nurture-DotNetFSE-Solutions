<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Typography</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>
<body>

    <div class="container mt-5">

        <h1 class="display-1 text-primary">
            Community Event Portal
        </h1>

        <p class="lead">
            Welcome to the official community events platform.
        </p>

        <p class="text-muted">
            This text uses Bootstrap's muted style.
        </p>

        <p class="fw-bold">
            This text is bold using fw-bold.
        </p>

        <hr>

        <h3 class="text-uppercase">
            community festival
        </h3>

        <h3 class="text-lowercase">
            COMMUNITY FESTIVAL
        </h3>

        <h3 class="text-capitalize">
            community festival registration
        </h3>

    </div>

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

</body>
</html>
