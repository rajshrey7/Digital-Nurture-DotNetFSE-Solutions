<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Positioning Utilities</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>
<body>

    <div class="container py-5">

        <h1 class="text-center mb-5">
            Bootstrap Positioning Utilities
        </h1>

        <div class="text-center">

            <div class="position-relative d-inline-block">

                <img
                    src="images/profile.jpg"
                    alt="Profile"
                    class="rounded shadow"
                    width="250">

                <span
                    class="badge bg-danger position-absolute top-0 start-100 translate-middle">

                    New

                </span>

            </div>

        </div>

        <div class="mt-5 text-center">

            <h3>Profile Badge Overlay Example</h3>

            <p>
                The badge is positioned using
                position-relative and position-absolute.
            </p>

        </div>

    </div>

    <footer
        class="position-fixed bottom-0 start-0 w-100 bg-dark text-white text-center py-2">

        © 2026 Community Event Portal

    </footer>

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

</body>
</html>
