<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cards and Media Objects</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>
<body>

    <div class="container mt-5">

        <h1 class="text-center mb-4">
            Profile Card
        </h1>

        <div class="card mx-auto" style="width: 22rem;">

            <img
                src="images/profile.jpg"
                class="card-img-top"
                alt="Profile Image">

            <div class="card-body">

                <h5 class="card-title">
                    Shreyansh Raj
                </h5>

                <p class="card-text">
                    Passionate developer interested in
                    Web Development, .NET and Cloud Technologies.
                </p>

                <a href="#" class="btn btn-primary">
                    View Profile
                </a>

            </div>

        </div>

        <hr class="my-5">

        <h1 class="text-center mb-4">
            Media Object Layout
        </h1>

        <div class="d-flex border p-3 rounded shadow">

            <img
                src="images/profile.png"
                alt="Profile"
                width="120"
                height="120"
                class="rounded me-3">

            <div>

                <h4>Community Event Coordinator</h4>

                <p>
                    Responsible for planning and managing
                    local community events, workshops,
                    cultural programs and volunteer activities.
                </p>

            </div>

        </div>

    </div>

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

</body>
</html>
