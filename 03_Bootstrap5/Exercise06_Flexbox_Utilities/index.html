<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Flexbox Utilities</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>
<body>

    <div class="container mt-5">

        <h1 class="text-center mb-4">
            Responsive Navbar
        </h1>

        <div
            class="d-flex flex-column flex-md-row justify-content-between align-items-center bg-primary text-white p-3 rounded">

            <h3>Community Portal</h3>

            <div class="d-flex gap-3">
                <a href="#" class="text-white text-decoration-none">Home</a>
                <a href="#" class="text-white text-decoration-none">Events</a>
                <a href="#" class="text-white text-decoration-none">Gallery</a>
                <a href="#" class="text-white text-decoration-none">Contact</a>
            </div>

        </div>

        <hr class="my-5">

        <h1 class="text-center mb-4">
            Card Layout
        </h1>

        <div
            class="d-flex justify-content-between align-items-center border p-4 rounded shadow">

            <div>
                <h4>Music Festival</h4>
                <p class="mb-0">
                    Live performances and entertainment.
                </p>
            </div>

            <button class="btn btn-success">
                Register
            </button>

        </div>

    </div>

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

</body>
</html>
