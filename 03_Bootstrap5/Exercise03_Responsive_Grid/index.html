<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Grid Layout</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>
<body>

    <div class="container mt-5">

        <h1 class="text-center mb-4">
            Community Events
        </h1>

        <div class="row g-4">

            <div class="col-12 col-md-6 col-lg-4">
                <div class="card p-3">
                    <h3>Music Festival</h3>
                    <p>Enjoy live performances and entertainment.</p>
                </div>
            </div>

            <div class="col-12 col-md-6 col-lg-4">
                <div class="card p-3">
                    <h3>Food Fair</h3>
                    <p>Explore delicious local cuisine.</p>
                </div>
            </div>

            <div class="col-12 col-md-6 col-lg-4">
                <div class="card p-3">
                    <h3>Marathon</h3>
                    <p>Participate in the annual city marathon.</p>
                </div>
            </div>

        </div>

    </div>

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

</body>
</html>
