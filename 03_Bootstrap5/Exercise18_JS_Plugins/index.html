<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap JavaScript Plugins</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>
<body>

    <div class="container py-5">

        <h1 class="text-center mb-5">
            Bootstrap JavaScript Plugins
        </h1>

        <div class="text-center mb-5">

            <button
                class="btn btn-primary"
                data-bs-toggle="modal"
                data-bs-target="#eventModal">

                Open Event Modal

            </button>

        </div>

        <div
            class="modal fade"
            id="eventModal"
            tabindex="-1">

            <div class="modal-dialog">

                <div class="modal-content">

                    <div class="modal-header">

                        <h5 class="modal-title">
                            Community Event
                        </h5>

                        <button
                            type="button"
                            class="btn-close"
                            data-bs-dismiss="modal">
                        </button>

                    </div>

                    <div class="modal-body">

                        Registration for the Community Festival
                        is now open.

                    </div>

                    <div class="modal-footer">

                        <button
                            type="button"
                            class="btn btn-secondary"
                            data-bs-dismiss="modal">

                            Close

                        </button>

                        <button
                            type="button"
                            class="btn btn-success">

                            Register

                        </button>

                    </div>

                </div>

            </div>

        </div>

        <hr class="my-5">

        <h2 class="mb-4">
            Frequently Asked Questions
        </h2>

        <div class="accordion" id="eventAccordion">

            <div class="accordion-item">

                <h2 class="accordion-header">

                    <button
                        class="accordion-button"
                        type="button"
                        data-bs-toggle="collapse"
                        data-bs-target="#faq1">

                        What is the Community Festival?

                    </button>

                </h2>

                <div
                    id="faq1"
                    class="accordion-collapse collapse show"
                    data-bs-parent="#eventAccordion">

                    <div class="accordion-body">

                        A cultural and social gathering for
                        community members.

                    </div>

                </div>

            </div>

            <div class="accordion-item">

                <h2 class="accordion-header">

                    <button
                        class="accordion-button collapsed"
                        type="button"
                        data-bs-toggle="collapse"
                        data-bs-target="#faq2">

                        How can I register?

                    </button>

                </h2>

                <div
                    id="faq2"
                    class="accordion-collapse collapse"
                    data-bs-parent="#eventAccordion">

                    <div class="accordion-body">

                        Registration can be completed through
                        the event portal.

                    </div>

                </div>

            </div>

            <div class="accordion-item">

                <h2 class="accordion-header">

                    <button
                        class="accordion-button collapsed"
                        type="button"
                        data-bs-toggle="collapse"
                        data-bs-target="#faq3">

                        Is there an entry fee?

                    </button>

                </h2>

                <div
                    id="faq3"
                    class="accordion-collapse collapse"
                    data-bs-parent="#eventAccordion">

                    <div class="accordion-body">

                        Entry is free for all registered participants.

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

</body>
</html>
