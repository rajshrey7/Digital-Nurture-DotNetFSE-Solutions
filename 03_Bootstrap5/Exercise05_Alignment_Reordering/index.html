<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alignment and Reordering</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>
<body>

    <div class="container mt-5">

        <h1 class="text-center mb-4">
            Alignment Example
        </h1>

        <div
            class="row justify-content-center align-items-center bg-light"
            style="height:300px;">

            <div class="col-4">
                <div class="bg-primary text-white p-4 text-center rounded">
                    Centered Box
                </div>
            </div>

        </div>

        <hr class="my-5">

        <h1 class="text-center mb-4">
            Column Reordering
        </h1>

        <div class="row">

            <div class="col-md-6 order-md-2">
                <div class="bg-warning p-4 rounded">
                    <h3>First on Mobile</h3>
                    <p>
                        This column appears second on desktop.
                    </p>
                </div>
            </div>

            <div class="col-md-6 order-md-1">
                <div class="bg-info p-4 rounded">
                    <h3>Second on Mobile</h3>
                    <p>
                        This column appears first on desktop.
                    </p>
                </div>
            </div>

        </div>

    </div>

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

</body>
</html>
