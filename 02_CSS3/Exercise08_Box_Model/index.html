<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model and Layout Control</title>

    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1>Community Event Portal</h1>

    <div class="eventCard">

        <h2>Music Festival</h2>

        <p>
            Enjoy live music performances from local artists.
        </p>

    </div>

    <form>

        <label>Name</label>

        <input
            type="text"
            placeholder="Enter your name">

    </form>

    <div class="hiddenBox">
        This box uses visibility: hidden
    </div>

    <div class="noneBox">
        This box uses display: none
    </div>

</body>
</html>
